<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumentos | Pro-visión</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #FF6B00; --secondary: #FFD700; --dark: #0a0a0a; --darker: #000000; }
        body { font-family: 'Montserrat', sans-serif; background: var(--darker); color: #ffffff; line-height: 1.8; }
        .header { background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%); padding: 1.5rem 2rem; border-bottom: 2px solid rgba(255, 107, 0, 0.3); position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo-small { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--primary); text-decoration: none; letter-spacing: 0.1em; }
        .nav-top { display: flex; gap: 2rem; flex-wrap: wrap; }
        .nav-link { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s ease; position: relative; font-weight: 500; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--primary); transition: width 0.3s ease; }
        .nav-link:hover { color: var(--primary); }
        .nav-link:hover::after { width: 100%; }
        .nav-link.active { color: var(--primary); }
        .hero-section { padding: 6rem 2rem 4rem; background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%); }
        .hero-content { max-width: 1200px; margin: 0 auto; text-align: center; }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 10vw, 6rem); color: var(--primary); margin-bottom: 1rem; letter-spacing: 0.05em; }
        .page-subtitle { font-size: 1.2rem; color: var(--secondary); font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; }
        .instruments-grid { max-width: 1000px; margin: 0 auto; padding: 4rem 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }
        .instrument-card { background: rgba(255, 107, 0, 0.05); border: 2px solid rgba(255, 107, 0, 0.3); border-radius: 15px; padding: 2rem; text-align: center; transition: all 0.3s ease; }
        .instrument-card:hover { transform: translateY(-10px); border-color: var(--secondary); box-shadow: 0 20px 40px rgba(255, 107, 0, 0.3); }
        .instrument-icon { font-size: 4rem; margin-bottom: 1rem; }
        .instrument-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--secondary); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .instrument-player { color: var(--primary); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em; }
        .bottom-nav { background: var(--dark); padding: 3rem 2rem; border-top: 2px solid rgba(255, 107, 0, 0.3); }
        .bottom-nav-content { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .nav-btn { padding: 1.2rem 1.5rem; background: rgba(255, 107, 0, 0.05); border: 2px solid rgba(255, 107, 0, 0.3); border-radius: 10px; color: #ffffff; font-weight: 600; text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s ease; text-align: center; font-size: 0.9rem; }
        .nav-btn:hover { background: linear-gradient(135deg, var(--primary), var(--secondary)); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255, 107, 0, 0.3); }
        @media (max-width: 768px) { .instruments-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo-small">PRO-VISIÓN</a>
            <nav class="nav-top">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="historia.html" class="nav-link">Historia</a>
                <a href="biografia.html" class="nav-link">Biografía</a>
                <a href="estilo.html" class="nav-link">Estilo</a>
                <a href="albun.html" class="nav-link">Álbum</a>
                <a href="instrumentos.html" class="nav-link active">Instrumentos</a>
                <a href="formulario.html" class="nav-link">Contacto</a>
            </nav>
        </div>
    </header>
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="page-title">Nuestros Instrumentos</h1>
            <p class="page-subtitle">El sonido de Pro-visión</p>
        </div>
    </section>
    <section class="instruments-grid">
        <div class="instrument-card">
            <div class="instrument-icon">🎤</div>
            <h3 class="instrument-name">Voz</h3>
            <p class="instrument-player">Dario</p>
        </div>
        <div class="instrument-card">
            <div class="instrument-icon">🎸</div>
            <h3 class="instrument-name">Guitarras</h3>
            <p class="instrument-player">Dario & David</p>
        </div>
        <div class="instrument-card">
            <div class="instrument-icon">🎹</div>
            <h3 class="instrument-name">Teclados</h3>
            <p class="instrument-player">Iker</p>
        </div>
        <div class="instrument-card">
            <div class="instrument-icon">🥁</div>
            <h3 class="instrument-name">Batería</h3>
            <p class="instrument-player">Josué</p>
        </div>
        <div class="instrument-card">
            <div class="instrument-icon">🎸</div>
            <h3 class="instrument-name">Bajo</h3>
            <p class="instrument-player">Oscar</p>
        </div>
        <div class="instrument-card">
            <div class="instrument-icon">🎵</div>
            <h3 class="instrument-name">Coros</h3>
            <p class="instrument-player">Sara & Noemí</p>
        </div>
    </section>
    <nav class="bottom-nav">
        <div class="bottom-nav-content">
            <a href="historia.html" class="nav-btn">Historia</a>
            <a href="biografia.html" class="nav-btn">Biografía</a>
            <a href="estilo.html" class="nav-btn">Estilo</a>
            <a href="index.html" class="nav-btn">Inicio</a>
        </div>
    </nav>
</body>
</html>
