<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catwoman - Halle Berry</title>
    <meta name="description" content="Catwoman, Halle Berry, biografía, galería y sinopsis de la película">
    <meta name="keywords" content="catwoman, halle berry, película, biografía, galería">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --darker: #000000;
            --light-gold: #e8d4a0;
            --shadow: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: #ffffff;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(30%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 1200px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--gold);
            text-shadow: 0 0 30px var(--shadow), 0 0 60px var(--shadow);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--light-gold);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .nav-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .nav-btn {
            position: relative;
            padding: 1.2rem 3rem;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            cursor: pointer;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gold);
            transition: left 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: -1;
        }

        .nav-btn:hover::before {
            left: 0;
        }

        .nav-btn:hover {
            color: var(--darker);
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--shadow);
        }

        .video-section {
            position: relative;
            padding: 4rem 2rem;
            background: var(--dark);
        }

        .video-container {
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--darker);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .footer-text {
            max-width: 600px;
            margin: 0 auto;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        .scroll-indicator::before {
            content: '';
            display: block;
            width: 30px;
            height: 50px;
            border: 2px solid var(--gold);
            border-radius: 20px;
            position: relative;
        }

        .scroll-indicator::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: scroll 2s infinite;
        }

        @keyframes scroll {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
        }

        @media (max-width: 768px) {
            .nav-buttons {
                flex-direction: column;
                align-items: center;
            }

            .nav-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    
        html {
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        html::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
        }
        body {
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        body::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
        }
        </style>
</head>
<body>
    <section class="hero">
        <img src="hally.gif" alt="Catwoman" class="hero-bg">
        
        <div class="hero-content">
            <h1 class="logo">CATWOMAN</h1>
            <p class="subtitle">Halle Berry</p>
            
            <nav class="nav-buttons">
                <a href="sinopsis.html" class="nav-btn">Sinopsis</a>
                <a href="biografia.html" class="nav-btn">Biografía</a>
                <a href="galeria.html" class="nav-btn">Galería</a>
            </nav>
        </div>

        <div class="scroll-indicator"></div>
    </section>

    <section class="video-section">
        <div class="video-container">
            <video controls poster="">
                <source src="Catwoman_Trailer.webm" type="video/webm">
                Tu navegador no soporta la reproducción de vídeo.
            </video>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-text">
            <p>Web creada por Abel Rubio Hidalgo</p>
            <p style="margin-top: 0.5rem; opacity: 0.7;">Actualizada en 2026</p>
        </div>
    </footer>

    <audio id="intro-sound" src="sound.mp3" preload="auto"></audio>

    <script>
        if (!sessionStorage.getItem('soundPlayed')) {
            var sound = document.getElementById('intro-sound');
            var playSound = function() {
                sound.play().then(function() {
                    sessionStorage.setItem('soundPlayed', 'true');
                }).catch(function() {});
                document.removeEventListener('click', playSound);
                document.removeEventListener('keydown', playSound);
            };
            // Intentar reproducir automáticamente
            sound.play().then(function() {
                sessionStorage.setItem('soundPlayed', 'true');
            }).catch(function() {
                // Si el navegador bloquea el autoplay, esperar interacción
                document.addEventListener('click', playSound, { once: true });
                document.addEventListener('keydown', playSound, { once: true });
            });
        }
    </script>
</body>
</html>
